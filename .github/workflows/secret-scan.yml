name: Secret scan

# Defense-in-depth behind the local `secret-scan` pre-commit hook and the
# `.gitignore` secret patterns: if a credential is committed despite those, this
# fails the pull request before it can merge. Distributed to every Spine repo by
# `./config/pull`.

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run gitleaks on the working tree
        # `--no-git` scans the files as they exist in this checkout rather than the
        # full history, so an already-rotated secret left in old commits does not
        # fail unrelated pull requests, while a credential committed in the change
        # under review is still caught. `--redact` keeps secret values out of the
        # logs. The image tag is a deliberate pin — bump it through the usual
        # dependency-update process.
        run: >
          docker run --rm --volume "${{ github.workspace }}:/repo"
          ghcr.io/gitleaks/gitleaks:v8.21.2
          detect --no-git --source=/repo --redact --verbose --exit-code=1
