interface:
  display_name: "Raise Coverage"
  short_description: "Migrate to Kover if needed, then generate unit tests to close coverage gaps."
  default_prompt: "Use $raise-coverage. Step 0 first: detect the coverage setup. If vanilla JaCoCo is found anywhere, propose a one-shot repo-wide migration to Kover and wait for approval before editing. If no coverage frontend is in place, install Kover silently. Smoke check after migration: on a JVM module run `./gradlew :<module>:koverXmlReport --quiet` and confirm `<module>/build/reports/kover/report.xml` is non-empty; on a KMP module run `:<module>:koverXmlReportJvm` and check `reportJvm.xml` (the skill only migrates the JVM target). Then run the normal flow: localize uncovered lines and branches from Kover's JaCoCo-format XML report, propose a test-case list and wait for approval, then generate policy-compliant unit tests (stubs not mocks; written in Kotlin with Kotest assertions regardless of whether the code under test is Kotlin or Java; class names use the `Spec` suffix, e.g. `AbstractSourceFileSpec`) and re-run the same report task to verify the gaps are closed. Tests-only changes do not require a version bump."
